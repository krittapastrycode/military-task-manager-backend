services:
  mtml-postgres:
    image: postgres:15-alpine
    container_name: mtml-postgres
    environment:
      POSTGRES_DB: military_task_db
      POSTGRES_USER: MTML
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - mtml-postgres-data:/var/lib/postgresql/data
    networks:
      - mtml-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MTML -d military_task_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mtml-redis:
    image: redis:7-alpine
    container_name: mtml-redis
    ports:
      - "6379:6379"
    volumes:
      - mtml-redis-data:/data
    networks:
      - mtml-net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mtml-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtml-backend
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=mtml-postgres
      - DB_PORT=5432
      - DB_DATABASE=military_task_db
      - DB_USERNAME=MTML
      - DB_PASSWORD=password
      - REDIS_HOST=mtml-redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000,localhost:3001
      - FRONTEND_URL=http://localhost:3000
      - LINE_CHANNEL_ACCESS_TOKEN=${LINE_CHANNEL_ACCESS_TOKEN}
      - LINE_CHANNEL_SECRET=${LINE_CHANNEL_SECRET}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=${GOOGLE_SERVICE_ACCOUNT_JSON}
    ports:
      - "8000:8000"
    depends_on:
      mtml-postgres:
        condition: service_healthy
      mtml-redis:
        condition: service_healthy
    networks:
      - mtml-net
    restart: unless-stopped

  # Next.js Frontend (production profile only — สำหรับ deploy จริง)
  # สำหรับ dev: ไม่ต้อง run service นี้ ใช้ npm run dev แทน
  mtml-frontend:
    profiles:
      - production
    build:
      context: ./military-task-manager-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: mtml-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - mtml-backend
    networks:
      - mtml-net
    restart: unless-stopped

volumes:
  mtml-postgres-data:
    driver: local
  mtml-redis-data:
    driver: local

networks:
  mtml-net:
    driver: bridge
